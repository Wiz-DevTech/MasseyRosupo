<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Massey &amp; Rosupo — Trustee Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#0d0f14; --gold:#a89464; --gold-lt:#c8ae7e; --cream:#faf8f4; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:linear-gradient(180deg,#1c1f28,#0d0f14); color:var(--cream);
           font-family:'Cormorant Garamond',serif; min-height:100vh; display:flex;
           align-items:center; justify-content:center; flex-direction:column; gap:14px; }
    .mark { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.28em;
            text-transform:uppercase; color:var(--gold); }
    .name { font-size:22px; letter-spacing:.06em; color:var(--cream); }
    .sub { font-style:italic; color:var(--gold-lt); font-size:14px; }
    .spin { width:26px; height:26px; border:2px solid rgba(168,148,100,.25);
            border-top-color:var(--gold); border-radius:50%; animation:r 1s linear infinite; }
    @keyframes r { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="mark">M&amp;R</div>
  <div class="name">MASSEY &amp; ROSUPO CO.</div>
  <div class="sub">Delaware Holding Company</div>
  <div class="spin"></div>
  <div class="sub" id="msg">Redirecting to secure Trustee sign-in…</div>

  <script>
    // Redirect to the CipherNex Keycloak Trustee Login (Authorization Code + PKCE).
    (function () {
      var KC_AUTH  = "https://ciphernexid.wisdomignited.com/realms/ciphernex/protocol/openid-connect/auth";
      var CLIENT   = "massey-admin";
      var REDIRECT = window.location.origin + "/"; // bounce back to site root after login

      function b64url(buf) {
        return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)))
          .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }
      function rand(n) { return b64url(crypto.getRandomValues(new Uint8Array(n))); }

      try {
        var verifier = rand(32);
        crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier))
          .then(function (h) {
            var challenge = b64url(h);
            var state = rand(16);
            sessionStorage.setItem("mr_pkce_v", verifier);
            var url = KC_AUTH + "?" + new URLSearchParams({
              client_id: CLIENT,
              response_type: "code",
              scope: "openid",
              redirect_uri: REDIRECT,
              state: state,
              code_challenge: challenge,
              code_challenge_method: "S256"
            }).toString();
            window.location.href = url;
          });
      } catch (e) {
        document.getElementById("msg").textContent = "Redirect failed — please reload.";
      }
    })();
  </script>
</body>
</html>
