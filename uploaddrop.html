<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure File Drop — Massey &amp; Rosupo</title>
<style>
  body { font-family: 'Cormorant Garamond', Georgia, serif; background: #0d0f14; color: #f0ece3; max-width: 720px; margin: 40px auto; padding: 0 20px; }
  h1 { font-family: 'Cinzel', serif; color: #a89464; letter-spacing: 0.1em; }
  .card { border: 1px solid rgba(168,148,100,0.4); padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #161921; }
  label { display: block; font-size: 13px; color: #a89464; margin: 12px 0 4px; font-family: 'DM Mono', monospace; }
  select, input[type=text] { width: 100%; padding: 8px; background: #0d0f14; color: #f0ece3; border: 1px solid #333; border-radius: 4px; font-family: 'DM Mono', monospace; }
  input[type=file] { margin: 8px 0; color: #f0ece3; }
  button { background: #a89464; color: #0d0f14; border: none; padding: 10px 18px; border-radius: 4px; font-weight: 700; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
  button:disabled { opacity: 0.5; cursor: default; }
  #log { white-space: pre-wrap; font-family: 'DM Mono', monospace; font-size: 12px; color: #c8ae7e; margin-top: 14px; min-height: 40px; }
  .hint { font-size: 12px; color: #8a8675; line-height: 1.6; }
</style>
</head>
<body>
<h1>SECURE FILE DROP</h1>
<p class="hint">Upload the three HTML files directly to the server. No chat, no commands. Pick a destination, choose the file, click Upload. Repeat for each file.</p>

<div class="card">
  <label>Destination</label>
  <select id="dest">
    <option value="masseyrosupo.com">M&amp;R site (/opt/masseyrosupo.com/)</option>
    <option value="wi">WI site (/opt/wisdom-platform-git/frontend/public/)</option>
  </select>

  <label>Save as filename (leave as-is to keep original name)</label>
  <input type="text" id="rename" placeholder="e.g. Test.html  (blank = original name)" />

  <label>Choose file</label>
  <input type="file" id="file" />

  <div style="margin-top:16px">
    <button id="btn" onclick="upload()">UPLOAD</button>
  </div>
  <div id="log"></div>
</div>

<script>
function log(m) { document.getElementById('log').textContent += m + "\n"; }

async function upload() {
  const fileEl = document.getElementById('file');
  const dest = document.getElementById('dest').value;
  const rename = document.getElementById('rename').value.trim();
  if (!fileEl.files.length) { log('⚠ Choose a file first.'); return; }
  const fd = new FormData();
  fd.append('file', fileEl.files[0]);
  fd.append('dest', dest);
  fd.append('key', 'mr-drop-2026');
  if (rename) fd.append('rename', rename);
  const btn = document.getElementById('btn');
  btn.disabled = true;
  log('Uploading ' + fileEl.files[0].name + ' ...');
  try {
    const r = await fetch('/api/upload', { method: 'POST', body: fd });
    const j = await r.json();
    if (j.ok) log('✓ Saved: ' + j.saved + '  (' + j.bytes + ' bytes)');
    else log('✗ Error: ' + j.error);
  } catch (e) {
    log('✗ Network error: ' + e.message);
  }
  btn.disabled = false;
  fileEl.value = '';
  document.getElementById('rename').value = '';
}
</script>
</body>
</html>
