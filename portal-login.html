  <meta charset="UTF-8">

  <title>Massey &amp; Rosupo — Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #0d0f14;
      --ink-soft:   #15171e;
      --gold:       #a89464;
      --gold-lt:    #c8ae7e;
      --cream:      #faf8f4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(820px 460px at 50% -8%, rgba(168,148,100,0.10), transparent 58%),
        linear-gradient(180deg, #15171e 0%, #0d0f14 100%);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; padding: 28px;
    }
    .mark { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.30em; text-transform:uppercase; color:var(--gold); }
    .name { font-size:26px; letter-spacing:.06em; color:var(--cream); font-weight:600; text-align:center; }
    .label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold-lt); text-align:center; margin-top:-6px; }
    .rule { height:1px; width:64%; margin:4px auto 2px; background:linear-gradient(90deg, transparent, var(--gold), transparent); }
    .signin {
      margin-top:10px; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:16px; letter-spacing:.06em; text-transform:uppercase;
      color:var(--gold-lt); background:rgba(168,148,100,0.12); border:1px solid var(--gold); border-radius:2px; padding:12px 30px; cursor:pointer;
      transition:background .15s ease, color .15s ease, border-color .15s ease;
    }
    .signin:hover { background:var(--gold); color:var(--ink); border-color:var(--gold); }
    .return { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.10em; color:rgba(168,148,100,0.7); text-decoration:none; margin-top:4px; transition:color .15s ease; }
    .return:hover { color:var(--gold); }
    .ciphernex { position:fixed; left:0; right:0; text-align:center; padding-top:8px; border-top:1px solid rgba(168,148,100,0.15); bottom:18px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:rgba(168,148,100,0.55); }
  </style>

<body>
  <div class="mark">M&amp;R</div>
  <div class="name">MASSEY &amp; ROSUPO CO.</div>
  <div class="label">Client Portal</div>
  <div class="rule"></div>

  <button class="signin" id="signin">Sign In</button>
  <a class="return" href="https://masseyrosupo.com/">&larr; Return to main page</a>

  <div class="ciphernex">CipherNex Federation · Secure Beneficiary Access</div>

  <script>
    // Authorization Code + PKCE redirect to the CipherNex Keycloak Client Portal login.
    var KC_AUTH  = "https://ciphernexid.wisdomignited.com/realms/ciphernex/protocol/openid-connect/auth";
    var KC_TOKEN = "https://ciphernexid.wisdomignited.com/realms/ciphernex/protocol/openid-connect/token";
    var CLIENT   = "massey-client";
    var REDIRECT = window.location.origin + "/portal-login.html";

    function b64url(buf) {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
    function rand(n) { return b64url(crypto.getRandomValues(new Uint8Array(n))); }

    // ── Callback: if we came back with ?code=, exchange it for tokens ────────
    (function handleCallback() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      if (!code) return; // not a redirect callback — normal page load
      var verifier = sessionStorage.getItem("mr_portal_pkce_v");
      if (!verifier) { console.error("PKCE verifier missing"); return; }
      fetch(KC_TOKEN, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type: "authorization_code",
          client_id: CLIENT,
          code: code,
          redirect_uri: REDIRECT,
          code_verifier: verifier
        })
      }).then(function (r) { return r.json(); }).then(function (j) {
        if (j.access_token) {
          // Shared key the dashboards read for API auth.
          localStorage.setItem("mrToken", j.access_token);
          if (j.refresh_token) localStorage.setItem("mrRefresh", j.refresh_token);
          sessionStorage.removeItem("mr_portal_pkce_v");
          window.location.replace(REDIRECT.split("/portal-login.html")[0] + "/MainAccessDash.html");
        } else {
          console.error("token exchange failed", j);
          alert("Sign-in failed: " + (j.error_description || j.error));
        }
      }).catch(function (e) { console.error("token exchange error", e); });
    })();

    function goKeycloak() {
      function rnd(n) { return b64url(crypto.getRandomValues(new Uint8Array(n))); }
      var verifier = rnd(32);
      crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier)).then(function (h) {
        var challenge = b64url(h);
        var state = rnd(16);
        sessionStorage.setItem("mr_portal_pkce_v", verifier);
        window.location.href = KC_AUTH + "?" + new URLSearchParams({
          client_id: CLIENT,
          response_type: "code",
          scope: "openid",
          redirect_uri: REDIRECT,
          state: state,
          code_challenge: challenge,
          code_challenge_method: "S256"
        }).toString();
      });
    }
    document.getElementById("signin").addEventListener("click", goKeycloak);
  </script>
</body>
